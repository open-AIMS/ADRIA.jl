name: ADRIAanalysis Tests
on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'ADRIAanalysis/**'
      - 'ADRIA/src/**'
      - '.github/workflows/ADRIAanalysisTests.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
        with:
          cache-name: adriaanalysis-setup-cache-v2
      - name: Dev ADRIA into ADRIAanalysis environment
        run: |
          cd ADRIAanalysis
          julia --project=. -e 'using Pkg; Pkg.develop(path="../ADRIA"); Pkg.instantiate()'
      - name: Test ADRIAanalysis
        run: |
          cd ADRIAanalysis
          julia --project=. -e 'using Pkg; Pkg.test()'
