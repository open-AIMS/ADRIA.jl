name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1.11'
      - uses: julia-actions/cache@v3
      - name: Install dependencies
        run: julia --project=ADRIA/docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path="ADRIA")); Pkg.develop(PackageSpec(path="ADRIAanalysis")); Pkg.instantiate()'
      - name: Build documentation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=ADRIA/docs/ ADRIA/docs/make.jl
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        with:
          folder: ADRIA/docs/build/final_site
          branch: gh-pages
